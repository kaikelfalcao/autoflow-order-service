name: CI/CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  IMAGE_NAME: kaikelfalcao/autoflow-order
  NODE_VERSION: '20'

jobs:
  test:
    name: Lint + Test + Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: order_service
          POSTGRES_PASSWORD: order_service
          POSTGRES_DB: order_service
        ports:
          - '5433:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3.13-alpine
        ports:
          - '5672:5672'
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: '5433'
      DATABASE_USER: order_service
      DATABASE_PASSWORD: order_service
      DATABASE_NAME: order_service
      RABBITMQ_URL: amqp://guest:guest@localhost:5672
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build
      - run: npm run test:cov
      - run: npm run test:bdd --if-present

      # TODO: integrar SonarQube Community Edition (self-hosted) para emitir relatórios.
      # SonarCloud removido temporariamente — voltar com `sonar-scanner` apontando para a instância community.

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  docker:
    name: Build & Push Image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy → EKS
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: us-east-1
      K8S_CLUSTER: autoflow-dev-eks
      K8S_NAMESPACE: autoflow

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.K8S_CLUSTER }}

      - name: Apply manifests + rollout
        run: |
          kubectl apply -f k8s/ -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout restart deployment/order-service -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/order-service -n ${{ env.K8S_NAMESPACE }} --timeout=180s
