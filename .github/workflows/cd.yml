name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

env:
  IMAGE_NAME: kaikelfalcao/autoflow-order

jobs:
  docker:
    name: Build & Push Image
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy → EKS
    needs: docker
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: us-east-1
      K8S_CLUSTER: autoflow-dev-eks
      K8S_NAMESPACE: autoflow

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.K8S_CLUSTER }}

      - name: Apply manifests + rollout
        run: |
          kubectl apply -f k8s/ -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout restart deployment/order-service -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/order-service -n ${{ env.K8S_NAMESPACE }} --timeout=180s
