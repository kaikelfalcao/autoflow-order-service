name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  NODE_VERSION: '24'

jobs:
  test:
    name: Lint + Test + Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: order_service
          POSTGRES_PASSWORD: order_service
          POSTGRES_DB: order_service
        ports:
          - '5433:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3.13-alpine
        ports:
          - '5672:5672'
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: '5433'
      DATABASE_USER: order_service
      DATABASE_PASSWORD: order_service
      DATABASE_NAME: order_service
      RABBITMQ_URL: amqp://guest:guest@localhost:5672
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run format:check --if-present
      - run: npm run build
      - run: npm run test:cov
      - run: npm run test:bdd --if-present

      # TODO: integrar SonarQube Community Edition (self-hosted) para emitir relatórios.
      # SonarCloud removido temporariamente — voltar com `sonar-scanner` apontando para a instância community.

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
