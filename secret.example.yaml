# TEMPLATE — pipeline injeta valores reais via:
#   kubectl create secret generic order-secrets --from-literal=...
apiVersion: v1
kind: Secret
metadata:
  name: order-secrets
  namespace: autoflow
type: Opaque
stringData:
  NODE_ENV: production
  APP_PORT: "3001"

  # PostgreSQL — user dedicado, sem cross-access aos outros databases
  DATABASE_HOST: "REPLACE_ME"
  DATABASE_PORT: "5432"
  DATABASE_USER: order_user
  DATABASE_PASSWORD: "REPLACE_ME"
  DATABASE_NAME: order

  # RabbitMQ shared
  RABBITMQ_URL: "amqp://admin:REPLACE_ME@rabbitmq.autoflow.svc.cluster.local:5672"
  ENABLE_PAYMENT_CONSUMER: "true"

  CUSTOMER_SERVICE_URL: ""
  NEW_RELIC_APP_NAME: autoflow-order
