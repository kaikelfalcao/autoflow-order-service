apiVersion: batch/v1
kind: Job
metadata:
  name: order-service-migration
  namespace: order-service
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migration
          image: your-registry/order-service:latest
          imagePullPolicy: Always
          command: ["npm", "run", "migration:run"]
          envFrom:
            - configMapRef:
                name: order-service-config
            - secretRef:
                name: order-service-secret

