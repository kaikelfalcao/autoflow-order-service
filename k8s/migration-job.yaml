# Roda migrations do order-service (orders, items, status_history, budgets, customers, vehicles).
# Usa npm run migration:run porque o Dockerfile prod do order-service inclui src/ + node_modules.
apiVersion: batch/v1
kind: Job
metadata:
  name: order-migration
  namespace: autoflow
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migration
          image: kaikelfalcao/autoflow-order:latest
          command: ["npm", "run", "migration:run"]
          envFrom:
            - secretRef:
                name: order-secrets
