# SonarCloud configuration
# Gerado automaticamente — ver autoflow-infra/docs/04-sonarcloud-setup.md

sonar.projectKey=kaikelfalcao_autoflow-order-service
sonar.organization=kaikelfalcao
sonar.projectName=autoflow-order-service

# Source code
sonar.sources=src
sonar.tests=src,test,features
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,test/**/*,features/**/*
sonar.sourceEncoding=UTF-8

# TypeScript / JavaScript coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclusões — código gerado ou trivial não conta para análise
sonar.exclusions=  **/*.spec.ts,  **/*.test.ts,  **/node_modules/**,  **/dist/**,  **/coverage/**,  **/migrations/**,  **/*.dto.ts,  **/*.module.ts,  **/*.schema.ts,  **/*.orm-entity.ts,  **/main.ts,  **/newrelic.js,  **/data-source.ts,  **/typeorm.datasource.ts

# Cobertura — excluir o que não é código de domínio
sonar.coverage.exclusions=  **/*.dto.ts,  **/*.module.ts,  **/*.schema.ts,  **/*.orm-entity.ts,  **/main.ts,  **/migrations/**,  **/newrelic.js,  **/data-source.ts,  **/typeorm.datasource.ts,  **/winston.config.ts,  **/env.config.ts,  **/env.schema.ts,  **/__mocks__/**

# Quality gate — gate padrão da SonarCloud (sem ajuste)
sonar.qualitygate.wait=true
